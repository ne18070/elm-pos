name: Build & Release

# ── Secrets requis ────────────────────────────────────────────────────────────
# Desktop (déjà en place) :
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# Google Play (publication automatique de l'AAB) :
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON — JSON du compte de service Google Cloud.
#     1. Play Console → Configuration → Accès API → relier/créer un projet Google Cloud
#     2. Google Cloud Console → IAM et administration → Comptes de service → Créer
#        (ex: github-actions-play-publisher)
#     3. Sur ce compte de service → Clés → Ajouter une clé → JSON → télécharger
#     4. Retour Play Console → Accès API → repérer le compte de service → Gérer l'accès
#        de l'application → droits "Release Manager" (ou personnalisé : gérer les
#        versions de production) sur com.elmapp.mobile
#     5. Coller le contenu brut du JSON téléchargé dans le secret GitHub
#   ⚠️ Google refuse la 1ère publication d'une app via l'API : si com.elmapp.mobile
#      n'a JAMAIS eu de version envoyée manuellement sur la piste "production" via
#      la console, ce job échouera. Fais un premier envoi manuel de l'AAB une fois
#      avant de compter sur ce pipeline pour les publications suivantes.
#
# iOS / TestFlight (job build-ios, désactivé tant que le repo variable
# IOS_DEPLOY_ENABLED n'est pas à "true" — Settings → Secrets and variables →
# Actions → Variables) :
#   APPLE_TEAM_ID                  — Apple Developer → Membership → Team ID
#   APPLE_CERTIFICATE_BASE64       — certificat de distribution .p12 encodé en base64
#   APPLE_CERTIFICATE_PASSWORD     — mot de passe défini à l'export du .p12
#   APPLE_PROVISIONING_PROFILE_BASE64 — profil de provisioning "App Store" (.mobileprovision) en base64
#   APP_STORE_CONNECT_ISSUER_ID    — App Store Connect → Utilisateurs et accès → Clés → Issuer ID
#   APP_STORE_CONNECT_KEY_ID       — id de la clé API créée dans le même écran
#   APP_STORE_CONNECT_PRIVATE_KEY  — contenu du fichier AuthKey_XXXX.p8 (clé privée)
#   Prérequis côté Apple avant d'activer : créer l'app dans App Store Connect
#   (bundle ID com.elmapp.mobile), enregistrer le bundle ID sur developer.apple.com,
#   créer le certificat de distribution + le profil de provisioning "App Store".

on:
  push:
    tags:
      - 'v*'          # déclenché sur : git tag v1.0.0 && git push --tags
  workflow_dispatch:  # déclenchement manuel depuis GitHub UI

permissions:
  contents: write     # nécessaire pour créer une Release GitHub

jobs:
  # ── Windows (.exe + portable) ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-optional --ignore-engines --network-timeout 100000

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: GitHub secrets NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be configured."
            exit 1
          fi
        shell: bash

      - name: Create renderer/.env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > renderer/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> renderer/.env
        shell: bash

      - name: Build (Next.js + Electron)
        run: yarn build

      - name: Package Windows
        run: yarn dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.exe
          retention-days: 7

  # ── macOS (.dmg) ──────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-optional --ignore-engines --network-timeout 100000

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: GitHub secrets NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be configured."
            exit 1
          fi

      - name: Create renderer/.env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > renderer/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> renderer/.env

      - name: Build (Next.js + Electron)
        run: yarn build

      - name: Install dmg-license (required by electron-builder on macOS)
        run: npm install dmg-license --no-save

      - name: Package macOS
        run: yarn dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature Apple (optionnel — laisse vide si pas de compte développeur)
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/*.dmg
          retention-days: 7

  # ── Linux (.AppImage) ─────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libusb-1.0-0-dev

      - name: Install dependencies
        run: yarn install --ignore-optional --ignore-engines --network-timeout 100000

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ] || [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "ERROR: GitHub secrets NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be configured."
            exit 1
          fi

      - name: Create renderer/.env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > renderer/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> renderer/.env

      - name: Build (Next.js + Electron)
        run: yarn build

      - name: Package Linux
        run: yarn dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release/*.AppImage
          retention-days: 7

  # ── Android (.aab) ───────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: yarn install --ignore-optional --ignore-engines --network-timeout 100000

      - name: Create renderer/.env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > renderer/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> renderer/.env

      - name: Build Next.js + sync Capacitor
        run: yarn mobile:build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          python3 - <<'PYEOF'
          import base64, os, sys, re
          raw = os.environ.get('KEYSTORE_B64', '')
          d = re.sub(r'[^A-Za-z0-9+/]', '', raw)   # keep only base64 alphabet
          rem = len(d) % 4
          if rem == 1:
              print(f"ERROR: ANDROID_KEYSTORE_BASE64 secret is corrupted ({len(d)} data chars, len%4=1). Re-encode with: [Convert]::ToBase64String([IO.File]::ReadAllBytes('elm-release.jks'))", file=sys.stderr)
              sys.exit(1)
          d += '=' * ((4 - rem) % 4)
          open('elm-release.jks', 'wb').write(base64.b64decode(d))
          print(f"Keystore decoded: {len(open('elm-release.jks','rb').read())} bytes")
          PYEOF

      - name: Write keystore.properties
        run: |
          printf 'storeFile=../../elm-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            "${{ secrets.ANDROID_KEY_ALIAS }}" \
            "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            > android/keystore.properties

      - name: Build signed AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ── Publication automatique sur le Play Store (piste production) ──────────
  deploy-android-playstore:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # seulement sur un tag v*
    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: android-release/

      - name: Upload to Google Play (production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.elmapp.mobile
          releaseFiles: android-release/app-release.aab
          track: production
          status: completed

  # ── iOS (build signé + upload TestFlight) ──────────────────────────────────
  # Désactivé tant que le repo variable IOS_DEPLOY_ENABLED n'est pas "true"
  # (Settings → Secrets and variables → Actions → Variables) — voir la liste des
  # secrets requis en haut de ce fichier.
  build-ios:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/') && vars.IOS_DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-optional --ignore-engines --network-timeout 100000

      - name: Create renderer/.env
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > renderer/.env
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> renderer/.env

      - name: Build Next.js + sync Capacitor
        run: yarn mobile:build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Import signing certificate & provisioning profile
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo -n "$CERT_B64" | base64 --decode -o "$CERT_PATH"
          echo -n "$PROFILE_B64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Archive .ipa
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="iPhone Distribution" \
            archive

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/App.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

  # ── Création de la Release GitHub ─────────────────────────────────────────
  publish-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # seulement sur un tag v*
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-release/*.exe
            artifacts/macos-release/*.dmg
            artifacts/linux-release/*.AppImage
            artifacts/android-release/*.aab
          generate_release_notes: true   # génère les notes depuis les commits
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
