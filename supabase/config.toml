[project]
id = "elm-app"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
email_confirm_changes = false
email_secure_password_change = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[functions]
verify_jwt = true

[functions.send-email]
verify_jwt = false

[functions.welcome-email]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false

[functions.daily-services-report]
verify_jwt = false
